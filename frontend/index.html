<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DACN - Join the Movement</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .achievement-unlock {
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="fixed top-0 right-0 m-4 text-xl">
        <span id="userScore" class="font-bold">🌟 0</span>
        <span id="userRank" class="ml-4 text-green-400">Novice</span>
    </div>

    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 pulse">DACN</h1>
            <p class="text-xl text-gray-400">Join <span id="activeUsers" class="text-green-400">2,547</span> pioneers shaping the future</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-12">
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-2xl font-bold mb-4">🏆 Your Impact</h2>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span>Network Influence</span>
                        <div class="w-48 bg-gray-700 rounded-full h-4">
                            <div id="influenceBar" class="bg-blue-500 rounded-full h-4" style="width: 25%"></div>
                        </div>
                    </div>
                    <div id="achievements" class="grid grid-cols-3 gap-4">
                        <!-- Dynamic achievements -->
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-2xl font-bold mb-4">🔥 Activity Feed</h2>
                <div id="feed" class="space-y-4 h-64 overflow-y-auto">
                    <!-- Dynamic feed items -->
                </div>
            </div>
        </div>

        <div class="text-center">
            <button onclick="shareAchievement()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transform transition hover:scale-105">
                Share Your Progress 🚀
            </button>
        </div>
    </div>

    <div id="achievementPopup" class="hidden fixed bottom-4 right-4 bg-green-500 text-white p-4 rounded-lg achievement-unlock">
        🎉 New Achievement Unlocked!
    </div>

    <script>
        // Simulate real-time activity
        setInterval(() => {
            const activities = [
                '🌟 Alice just reached Level 5!',
                '🤝 Bob connected with 3 new collaborators',
                '🎯 Carol completed a major milestone',
                '🚀 David launched a new initiative'
            ];
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = 'p-3 bg-gray-700 rounded-lg';
            div.textContent = activities[Math.floor(Math.random() * activities.length)];
            feed.prepend(div);
            if (feed.children.length > 10) feed.lastChild.remove();
        }, 3000);

        // Simulate user progress
        let score = 0;
        setInterval(() => {
            score += Math.floor(Math.random() * 10);
            document.getElementById('userScore').textContent = `🌟 ${score}`;
            document.getElementById('influenceBar').style.width = `${Math.min((score / 1000) * 100, 100)}%`;
            if (score > 100 && !document.querySelector('[data-achievement="first-100"]')) {
                unlockAchievement('First 100 Points! 🎉');
            }
        }, 5000);

        function unlockAchievement(title) {
            const achievements = document.getElementById('achievements');
            const achievement = document.createElement('div');
            achievement.className = 'bg-gray-700 p-3 rounded-lg text-center text-sm';
            achievement.setAttribute('data-achievement', 'first-100');
            achievement.textContent = title;
            achievements.appendChild(achievement);

            const popup = document.getElementById('achievementPopup');
            popup.classList.remove('hidden');
            setTimeout(() => popup.classList.add('hidden'), 3000);
        }

        function shareAchievement() {
            if (navigator.share) {
                navigator.share({
                    title: 'My DACN Progress',
                    text: `I've earned ${score} points on DACN! Join me in shaping the future of collaboration!`,
                    url: window.location.href
                });
            }
        }

        // Simulate active users count
        setInterval(() => {
            const activeUsers = document.getElementById('activeUsers');
            const current = parseInt(activeUsers.textContent);
            activeUsers.textContent = current + Math.floor(Math.random() * 10);
        }, 10000);
    </script>
</body>
</html>
