<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DACN - Collaborate & Earn</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="bg-gradient-to-r from-purple-900 via-indigo-900 to-blue-900 text-white min-h-screen">
    <div id="confetti-container" class="fixed inset-0 pointer-events-none"></div>
    
    <nav class="p-4 backdrop-blur-md bg-opacity-30 bg-black sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold">🌐 DACN</div>
            <div class="flex items-center space-x-4">
                <div class="animate-pulse bg-green-500 rounded-full px-4 py-2">
                    <span id="online-count">1,337</span> online now
                </div>
                <div class="bg-purple-600 rounded-xl px-4 py-2">
                    <span id="user-points">0</span> ⭐ Points
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div class="grid md:grid-cols-2 gap-8">
            <!-- Achievement System -->
            <div class="bg-white bg-opacity-10 rounded-xl p-6 backdrop-blur-md">
                <h2 class="text-2xl font-bold mb-4">🏆 Your Achievements</h2>
                <div class="grid grid-cols-3 gap-4" id="achievements">
                    <div class="achievement-card cursor-pointer transform hover:scale-105 transition-all" onclick="unlockAchievement('first_contribution')">
                        <div class="bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-lg p-4 text-center">
                            <span class="text-4xl">🌟</span>
                            <h3 class="mt-2">First Contribution</h3>
                            <p class="text-sm opacity-75">+100 points</p>
                        </div>
                    </div>
                    <!-- More achievement cards here -->
                </div>
            </div>

            <!-- Real-time Activity Feed -->
            <div class="bg-white bg-opacity-10 rounded-xl p-6 backdrop-blur-md">
                <h2 class="text-2xl font-bold mb-4">🔥 Live Activity</h2>
                <div id="activity-feed" class="space-y-4 max-h-96 overflow-auto">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <!-- Daily Challenges -->
        <div class="mt-8 bg-white bg-opacity-10 rounded-xl p-6 backdrop-blur-md">
            <h2 class="text-2xl font-bold mb-4">🎯 Daily Challenges</h2>
            <div class="grid md:grid-cols-3 gap-4" id="challenges">
                <div class="challenge-card bg-gradient-to-br from-blue-500 to-blue-700 rounded-lg p-4">
                    <h3 class="font-bold">Speed Champion</h3>
                    <p>Complete 5 tasks in under 1 hour</p>
                    <div class="mt-2 bg-blue-900 rounded-full h-2">
                        <div class="bg-blue-300 rounded-full h-2 w-1/3"></div>
                    </div>
                    <p class="text-sm mt-2">Reward: 500 points</p>
                </div>
                <!-- More challenge cards -->
            </div>
        </div>
    </main>

    <!-- Floating Achievement Notification -->
    <div id="achievement-popup" class="fixed bottom-4 right-4 transform translate-y-full opacity-0 transition-all duration-500">
        <div class="bg-gradient-to-r from-yellow-400 to-yellow-600 rounded-lg p-4 shadow-lg">
            <h3 class="font-bold">🎉 Achievement Unlocked!</h3>
            <p id="achievement-text"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
    <script>
        // Gamification System
        let points = 0;
        const achievementPopup = document.getElementById('achievement-popup');
        const achievementText = document.getElementById('achievement-text');

        function unlockAchievement(id) {
            points += 100;
            document.getElementById('user-points').textContent = points;
            
            // Show popup
            achievementText.textContent = 'You earned the First Contribution badge! +100 points';
            achievementPopup.classList.remove('translate-y-full', 'opacity-0');
            
            // Trigger confetti
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });

            setTimeout(() => {
                achievementPopup.classList.add('translate-y-full', 'opacity-0');
            }, 3000);
        }

        // Simulate real-time activity
        setInterval(() => {
            const feed = document.getElementById('activity-feed');
            const activities = [
                '🚀 Alice just completed a challenge!',
                '💫 Bob earned 500 points!',
                '🌟 Carol reached level 10!'
            ];
            
            const div = document.createElement('div');
            div.className = 'bg-white bg-opacity-20 rounded p-3 animate__animated animate__fadeInRight';
            div.textContent = activities[Math.floor(Math.random() * activities.length)];
            
            feed.insertBefore(div, feed.firstChild);
            if (feed.children.length > 5) feed.removeChild(feed.lastChild);
        }, 3000);

        // Simulate online count variations
        setInterval(() => {
            const count = document.getElementById('online-count');
            count.textContent = (1337 + Math.floor(Math.random() * 100)).toLocaleString();
        }, 5000);
    </script>
</body>
</html>
